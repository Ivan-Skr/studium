<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Моя LMS{% endblock %}</title>
    <style>
        body {
            margin: 0;
            padding: 50px 20px; /* Отступ сверху, чтобы контент не перекрывался кнопкой */
            font-family: sans-serif;
        }
        .top-left-nav {
            position: absolute;
            top: 15px;
            left: 15px;
        }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="top-left-nav">
        {% if user.is_authenticated %}
            <a href="{% url 'users:profile' %}" class="btn">Профиль</a>
        {% else %}
            <a href="{% url 'users:login' %}" class="btn">Войти</a>
        {% endif %}
    </div>

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
