{% extends "base.html" %}

{% block title %}{{ title }} — {{ course.name }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-6">

  <div class="mb-6">
    <a href="{% url 'lessons:teacher_course_edit' course.pk %}" class="text-sm text-gray-500 hover:text-gray-400 transition-colors">
      ← {{ course.name }}
    </a>
    <h1 class="text-2xl font-bold mt-2 dark:text-white transition-colors">{{ title }}</h1>
  </div>

  <form method="post" class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg p-6 space-y-5 shadow-sm transition-colors duration-200">
    {% csrf_token %}

    {% for field in form %}
    <div>
      <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 transition-colors">
        {{ field.label }}
      </label>
      {{ field }}
      {% for error in field.errors %}
      <p class="mt-1 text-sm text-red-600 dark:text-red-400 transition-colors">{{ error }}</p>
      {% endfor %}
    </div>
    {% endfor %}

    <div class="flex gap-3">
      <button type="submit" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium transition-colors">
        Сохранить
      </button>
      <a href="{% url 'lessons:teacher_course_edit' course.pk %}" class="px-5 py-2.5 border border-gray-200 dark:border-slate-600 text-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-50 dark:hover:bg-slate-700 font-medium transition-colors">
        Отмена
      </a>
    </div>
  </form>

</div>
{% endblock %}
