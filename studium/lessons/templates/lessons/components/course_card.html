<a href="{% url 'lessons:course_detail' course.pk %}"
   class="block bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg overflow-hidden shadow-sm hover:shadow-md transition-all duration-200">
  {% if course.image %}
    <div class="aspect-video bg-gray-100 dark:bg-slate-900 overflow-hidden transition-colors">
      <img src="{{ course.image.url }}" alt="{{ course.name }}" class="w-full h-full object-cover">
    </div>
  {% endif %}
  <div class="p-5">
    <h3 class="text-lg font-semibold mb-2 dark:text-white transition-colors">{{ course.name }}</h3>
    <p class="text-sm text-gray-600 dark:text-gray-300 line-clamp-3 mb-3 transition-colors">{{ course.description }}</p>
    {% if course.author %}
      <p class="text-xs text-gray-500 dark:text-gray-400 transition-colors">Автор: {{ course.author.get_full_name|default:course.author.username }}</p>
    {% endif %}
    {% if course.category %}
      <span class="inline-block mt-2 px-2 py-0.5 text-xs bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-200 rounded transition-colors">{{ course.category.name }}</span>
    {% endif %}
  </div>
</a>
