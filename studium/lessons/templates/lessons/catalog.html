{% extends "base.html" %}

{% block title %}Каталог курсов — Studium{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-6">

  <div class="mb-8">
    <h1 class="text-3xl font-bold mb-2">Каталог курсов</h1>
    <p class="text-gray-600">Выберите курс для начала обучения</p>
  </div>

  <div class="mb-8">
    <form method="get" class="relative max-w-md">
      <input
        type="search"
        name="q"
        placeholder="Поиск курсов..."
        value="{{ request.GET.q }}"
        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </form>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for course in courses %}
      {% include "lessons/components/course_card.html" %}
    {% empty %}
      <p class="col-span-full text-center py-12 text-gray-500">Курсы не найдены</p>
    {% endfor %}
  </div>

</div>
{% endblock %}
